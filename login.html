<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BD Tracking System R8</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Prompt', sans-serif;
            background: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%);
            color: #1a1a24;
        }
        .apple-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.03), 0 1px 3px rgba(0,0,0,0.02);
            border: 1px solid rgba(255, 255, 255, 0.7);
        }
        .apple-input {
            background: #f8f9fa;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            padding: 14px 16px;
            width: 100%;
            transition: all 0.2s ease;
        }
        .apple-input:focus {
            background: #ffffff;
            border-color: #1e3c72;
            box-shadow: 0 0 0 4px rgba(30, 60, 114, 0.08);
            outline: none;
        }
        .apple-btn-primary {
            background: #1e3c72;
            color: #ffffff;
            border-radius: 12px;
            padding: 12px 28px;
            font-weight: 500;
            width: 100%;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(30, 60, 114, 0.15);
        }
        .apple-btn-primary:hover { background: #162c5b; transform: translateY(-1px); }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="apple-card p-8 sm:p-12 w-full max-w-md">
        <div class="text-center mb-8">
            <h1 class="text-2xl font-bold text-[#0f172a] mb-2">เข้าสู่ระบบ</h1>
            <p class="text-sm text-gray-500">BD Tracking System R8</p>
        </div>

        <form id="loginForm" onsubmit="event.preventDefault(); handleLogin();" class="space-y-6">
            <div>
                <label class="text-[13px] font-semibold text-gray-600 mb-2 block uppercase tracking-wide">ชื่อผู้ใช้งาน (Username)</label>
                <input type="text" id="username" class="apple-input">
            </div>
            <div>
                <label class="text-[13px] font-semibold text-gray-600 mb-2 block uppercase tracking-wide">รหัสผ่าน (Password)</label>
                <input type="password" id="password" class="apple-input">
            </div>
            <button type="submit" id="loginBtn" class="apple-btn-primary mt-4">
                ลงชื่อเข้าใช้
            </button>
        </form>
    </div>

    <script>
        // --- 1. ตั้งค่าการเชื่อมต่อ ---
        // (อย่าลืมแก้ไข 2 บรรทัดนี้ให้เป็น API Key ของโปรเจกต์คุณ)
        const SUPABASE_URL = 'https://bixfhtemapsrahdrkaze.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJpeGZodGVtYXBzcmFoZHJrYXplIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMxNzM4MzUsImV4cCI6MjA5ODc0OTgzNX0.JNt7w7LXfBJlmDp0POy-UvolL-Rrk0yI-zne6iYc_P0';
        
        // *แก้ไขตัวแปรเป็น supabaseClient เพื่อป้องกัน Error การประกาศชื่อซ้ำ
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // โดเมนจำลองสำหรับระบบภายในองค์กร
        const INTERNAL_DOMAIN = '@r8.local';

        // --- 2. ฟังก์ชันจัดการการเข้าสู่ระบบ ---
        async function handleLogin() {
            const usernameInput = document.getElementById('username').value.trim();
            const passwordInput = document.getElementById('password').value;
            const btn = document.getElementById('loginBtn');

            // รวม Username เข้ากับโดเมนจำลอง เพื่อส่งให้ Supabase ตรวจสอบ
            const mappedEmail = usernameInput + INTERNAL_DOMAIN;

            // เปลี่ยนสถานะปุ่มตอนกำลังโหลด (Loading State)
            btn.disabled = true;
            btn.innerHTML = `<svg class="animate-spin -ml-1 mr-3 h-5 w-5 text-white inline-block" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg> กำลังตรวจสอบ...`;
            btn.classList.add('opacity-70', 'cursor-not-allowed');

            // ส่งข้อมูลไปตรวจสอบที่ Supabase Auth โดยใช้ supabaseClient
            const { data, error } = await supabaseClient.auth.signInWithPassword({
                email: mappedEmail,
                password: passwordInput,
            });

            if (error) {
                // กรณีล็อกอินไม่ผ่าน
                Swal.fire({ 
                    icon: 'error', 
                    title: 'เข้าสู่ระบบไม่สำเร็จ', 
                    text: 'ชื่อผู้ใช้งานหรือรหัสผ่านไม่ถูกต้อง กรุณาลองใหม่อีกครั้ง',
                    confirmButtonColor: '#1e3c72',
                    customClass: { popup: 'rounded-[20px]' }
                });
                btn.disabled = false;
                btn.innerHTML = 'ลงชื่อเข้าใช้';
                btn.classList.remove('opacity-70', 'cursor-not-allowed');
            } else {
                // กรณีล็อกอินสำเร็จ
                Swal.fire({ 
                    icon: 'success', 
                    title: 'เข้าสู่ระบบสำเร็จ', 
                    text: 'ระบบกำลังนำท่านเข้าสู่หน้าหลัก กรุณารอสักครู่...', 
                    timer: 2000, 
                    showConfirmButton: false,
                    customClass: { popup: 'rounded-[20px]' }
                }).then(() => {
                    // Redirect ไปยังหน้าหลัก
                    window.location.href = 'index.html'; 
                });
            }
        }
    </script>
</body>
</html>
